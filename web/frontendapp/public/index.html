  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>

    <!-- Service Worker Registration for PWA -->
    <script>
      // Check if PWA is supported
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker
            .register('%PUBLIC_URL%/service-worker.js')
            .then((registration) => {
              console.log('✅ Service Worker registered', registration);
            })
            .catch((error) => {
              console.log('❌ Service Worker registration failed:', error);
            });
        });
      }

      // Detect if app was launched from home screen
      window.addEventListener('load', () => {
        if (
          window.matchMedia('(display-mode: standalone)').matches ||
          window.matchMedia('(display-mode: fullscreen)').matches
        ) {
          console.log('🚀 App running in standalone/fullscreen mode');
          document.body.classList.add('pwa-standalone');
        }
      });

      // Listen for app installation prompt
      let deferredPrompt;
      window.addEventListener('beforeinstallprompt', (e) => {
        e.preventDefault();
        deferredPrompt = e;
        // Trigger custom install UI
        window.dispatchEvent(new CustomEvent('pwa-install-prompt', { detail: e }));
      });

      // Handle successful app installation
      window.addEventListener('appinstalled', () => {
        console.log('🎉 App installed successfully');
        window.dispatchEvent(new Event('pwa-installed'));
      });
    </script>
  </body>
